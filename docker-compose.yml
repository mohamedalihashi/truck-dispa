services:
  postgres:
    image: postgres:16-alpine
    container_name: truck-dispatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: truck
      POSTGRES_PASSWORD: truckpass
      POSTGRES_DB: truck_dispatch
    ports:
      - "5432:5432"
    volumes:
      - truck_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truck -d truck_dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  truck_pg_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: truckdispatch-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: truck
      POSTGRES_PASSWORD: truckpass
      POSTGRES_DB: truck_dispatch
    volumes:
      - truckdispatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truck -d truck_dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  truckdispatch_pgdata:
